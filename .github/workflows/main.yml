name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v3
      
      - name: Validate HTML
        run: |
          echo "Checking HTML files exist..."
          if [ -f "V1" ]; then
            echo "✓ V1 file exists"
          else
            echo "✗ V1 file not found"
            exit 1
          fi
          
      - name: Check file validity
        run: |
          echo "Validating V1 is an HTML file..."
          if grep -q "<!DOCTYPE html>" V1; then
            echo "✓ V1 is a valid HTML file"
          else
            echo "✗ V1 is not an HTML file"
            exit 1
          fi
          
      - name: Success
        run: echo "All checks passed!"
